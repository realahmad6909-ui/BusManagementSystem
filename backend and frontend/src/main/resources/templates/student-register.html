<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - UET Transport</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: linear-gradient(135deg, #4A0E17 0%, #28050A 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            padding: 20px;
        }

        .register-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 2.5rem 2rem;
            border-radius: 20px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .register-card i.main-icon {
            font-size: 3rem;
            color: #FFD700;
            margin-bottom: 0.8rem;
        }

        h2 { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.3rem; text-transform: uppercase; }
        h2 span { color: #FFD700; }
        p { color: #cccccc; font-size: 0.8rem; margin-bottom: 1.5rem; }

        .error-alert {
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid #dc3545;
            color: #ff8080;
            padding: 0.8rem;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            text-align: left;
            display: flex;
            align-items: center;
        }
        .error-alert i { margin-right: 10px; font-size: 1rem; }

        .input-group {
            position: relative;
            margin-bottom: 1.2rem;
            text-align: left;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
        }

        .input-group input {
            width: 100%;
            padding: 0.8rem 1rem 0.8rem 45px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #ffffff;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s;
        }

        .input-group input:focus {
            border-color: #FFD700;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.1);
        }

        .btn-register {
            width: 100%;
            background: #FFD700;
            color: #28050A;
            border: none;
            padding: 0.9rem;
            font-size: 0.95rem;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }

        .btn-register:hover {
            background: #ffffff;
            color: #4A0E17;
            transform: translateY(-2px);
        }

        .bottom-links {
            margin-top: 1.2rem;
            font-size: 0.8rem;
        }

        .bottom-links a {
            color: #FFD700;
            text-decoration: none;
            transition: color 0.3s;
        }

        .bottom-links a:hover { color: #ffffff; }
        .text-muted-custom { color: rgba(255,255,255,0.6); }
    </style>
</head>
<body>

<div class="register-card">
    <i class="fas fa-user-plus main-icon"></i>
    <h2>Student <span>Sign Up</span></h2>
    <p>Complete all fields to create your transport account</p>

    <div th:if="${error}" class="error-alert">
        <i class="fas fa-exclamation-circle"></i>
        <span th:text="${error}">Error Message</span>
    </div>

    <form th:action="@{/students/submit-register}" th:object="${studentForm}" method="POST">

        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="name" th:field="*{name}" placeholder="Full Name" required>
        </div>

        <div class="input-group">
            <i class="fas fa-id-card"></i>
            <input type="text" id="regNum" th:field="*{regNum}" placeholder="Registration Number (e.g., 2022-CS-12)" required>
        </div>

        <div class="input-group">
            <i class="fas fa-university"></i>
            <input type="text" id="department" th:field="*{department}" placeholder="Department (e.g., Computer Science)" required>
        </div>

        <div class="input-group">
            <i class="fas fa-phone"></i>
            <input type="text" id="phone" th:field="*{phone}" placeholder="Phone Number" required>
        </div>

        <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" th:field="*{email}" placeholder="UET Student Email Address" required>
        </div>

        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" th:field="*{password}" placeholder="Create Password" required>
        </div>

        <button type="submit" class="btn-register">Create Account</button>
    </form>

    <div class="bottom-links">
        <span class="text-muted-custom">Already have an account? </span>
        <a href="/students/login">Login Here</a>
    </div>
</div>

</body>
</html>
