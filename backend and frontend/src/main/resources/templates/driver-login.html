<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Login - UET Transport</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(135deg, #4A0E17 0%, #28050A 100%); min-height: 100vh; display: flex; flex-direction: column; justify-content: space-between; color: #ffffff; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 6%; background: rgba(0, 0, 0, 0.15); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .logo-area { display: flex; align-items: center; gap: 12px; font-size: 1.3rem; font-weight: 700; }
        .logo-area i { color: #FFD700; }
        .home-btn { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); color: #ffffff; padding: 0.5rem 1.2rem; border-radius: 50px; text-decoration: none; font-size: 0.85rem; font-weight: 600; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .home-btn:hover { background: #FFD700; color: #28050A; border-color: #FFD700; }
        .main-container { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 3rem 2rem; }
        .login-card { background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; padding: 3rem 2.5rem; width: 100%; max-width: 450px; box-shadow: 0 20px 45px rgba(0,0,0,0.4); text-align: center; }
        .card-header { margin-bottom: 2rem; }
        .card-header .icon-box { width: 70px; height: 70px; background: rgba(255, 215, 0, 0.1); border: 1px solid rgba(255, 215, 0, 0.25); border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 1rem auto; font-size: 2rem; color: #FFD700; }
        .card-header h2 { font-size: 1.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .card-header p { font-size: 0.85rem; color: #aaa; margin-top: 0.3rem; }
        .alert-danger { padding: 0.8rem; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px; text-align: left; background: rgba(231, 76, 60, 0.15); border: 1px solid #e74c3c; color: #ff8080; }
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        .form-group label { font-size: 0.8rem; color: #ddd; display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #FFD700; font-size: 0.9rem; }
        .input-wrapper input { width: 100%; padding: 0.75rem 0.75rem 0.75rem 2.5rem; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; color: white; font-size: 0.95rem; transition: 0.3s; }
        .input-wrapper input:focus { border-color: #FFD700; outline: none; box-shadow: 0 0 10px rgba(255, 215, 0, 0.15); }
        .btn-login { width: 100%; padding: 0.8rem; background: #FFD700; color: #28050A; border: none; border-radius: 8px; font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: 0.3s; text-transform: uppercase; margin-top: 1rem; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-login:hover { background: white; color: #4A0E17; }
        footer { padding: 1.5rem 6%; font-size: 0.85rem; color: rgba(255, 255, 255, 0.3); text-align: center; border-top: 1px solid rgba(255, 255, 255, 0.03); }
    </style>
</head>
<body>
<header>
    <div class="logo-area"><i class="fas fa-bus"></i> <span>UET Active Transit</span></div>
    <a href="/" class="home-btn"><i class="fas fa-home"></i> Home</a>
</header>
<div class="main-container">
    <div class="login-card">
        <div class="card-header">
            <div class="icon-box"><i class="fas fa-id-badge"></i></div>
            <h2>Driver Console</h2>
            <p>Sign in to your driver account using user credentials.</p>
        </div>
        <div class="alert-danger" th:if="${error}">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}">Error</span>
        </div>
        <form th:action="@{/drivers/login}" method="POST">
            <div class="form-group">
                <label>Driver Email</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" name="email" required placeholder="driver@uet.edu.pk">
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" required placeholder="••••••••">
                </div>
            </div>
            <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> Login As Driver</button>
        </form>
    </div>
</div>
<footer>University of Engineering & Technology | © 2026 Driver Authentication Console</footer>
</body>
</html>
