<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - UET Transport</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: linear-gradient(135deg, #4A0E17 0%, #28050A 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            padding: 1rem;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 2.5rem 2.5rem;
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        /* 🔙 Back Button Styling (Student Login Se Matched) */
        .back-home-btn {
            text-align: left;
            margin-bottom: 1.2rem;
            display: block;
        }
        .back-home-btn a {
            color: #FFD700;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .back-home-btn a:hover {
            color: #ffffff;
            transform: translateX(-3px);
        }

        .login-card i.main-lock {
            font-size: 3.5rem;
            color: #FFD700;
            margin-bottom: 1rem;
        }

        h2 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; text-transform: uppercase; }
        h2 span { color: #FFD700; }
        p { color: #cccccc; font-size: 0.85rem; margin-bottom: 2rem; }

        .error-alert {
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid #dc3545;
            color: #ff8080;
            padding: 0.8rem;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            text-align: left;
            display: flex;
            align-items: center;
        }
        .error-alert i { margin-right: 10px; font-size: 1rem; }

        .info-alert {
            background: rgba(255, 215, 0, 0.15);
            border: 1px solid #FFD700;
            color: #FFD700;
            padding: 0.8rem;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            text-align: left;
            display: flex;
            align-items: center;
        }
        .info-alert i { margin-right: 10px; }

        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
        }

        .input-group input {
            width: 100%;
            padding: 1rem 1rem 1rem 45px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #ffffff;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
        }

        .input-group input:focus {
            border-color: #FFD700;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.1);
        }

        .btn-login {
            width: 100%;
            background: #FFD700;
            color: #28050A;
            border: none;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }

        .btn-login:hover {
            background: #ffffff;
            color: #4A0E17;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="login-card">

    <div class="back-home-btn">
        <a href="/">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>
    </div>

    <i class="fas fa-user-shield main-lock"></i>
    <h2>Admin <span>Portal</span></h2>
    <p>Enter your credentials to access management console</p>

    <div th:if="${error}" class="error-alert">
        <i class="fas fa-exclamation-circle"></i>
        <span th:text="${error}">Error details fallback</span>
    </div>

    <div th:if="${param.error}" class="info-alert">
        <i class="fas fa-shield-alt"></i>
        <span th:text="${param.error}">URL Error parameter</span>
    </div>

    <form th:action="@{/admin/submit-login}" th:object="${userForm}" method="POST">

        <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" name="email" th:field="*{email}" placeholder="Admin Email" required>
        </div>

        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" name="password" th:field="*{password}" placeholder="Password" required>
        </div>

        <button type="submit" class="btn-login">Sign In</button>
    </form>
</div>

</body>
</html>
