<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile - UET Transport</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(135deg, #4A0E17 0%, #28050A 100%); min-height: 100vh; display: flex; flex-direction: column; justify-content: space-between; color: #ffffff; }

        header { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 6%; background: rgba(0, 0, 0, 0.15); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .logo-area { display: flex; align-items: center; gap: 12px; font-size: 1.3rem; font-weight: 700; }
        .logo-area i { color: #FFD700; }

        .back-btn { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); color: #ffffff; padding: 0.5rem 1.2rem; border-radius: 50px; text-decoration: none; font-size: 0.85rem; font-weight: 600; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .back-btn:hover { background: #FFD700; color: #28050A; border-color: #FFD700; }

        .main-container { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 3rem 2rem; }

        /* Profile Card Framework */
        .profile-card { background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; padding: 3rem 2.5rem; width: 100%; max-width: 550px; box-shadow: 0 20px 45px rgba(0,0,0,0.4); position: relative; }

        .avatar-section { text-align: center; margin-bottom: 2rem; }
        .avatar-section i { font-size: 4.5rem; color: #FFD700; margin-bottom: 0.8rem; }
        .avatar-section h2 { font-size: 1.8rem; font-weight: 700; letter-spacing: 0.5px; }

        /* Status Badges */
        .status-badge { display: inline-block; padding: 0.3rem 1.2rem; border-radius: 50px; font-size: 0.8rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-top: 0.5rem; }
        .status-approved { background: rgba(46, 204, 113, 0.15); border: 1px solid #2ecc71; color: #2ecc71; }
        .status-pending { background: rgba(241, 196, 15, 0.15); border: 1px solid #f1c40f; color: #f1c40f; }

        /* Info Fields List */
        .info-grid { display: flex; flex-direction: column; gap: 1.2rem; margin-top: 1.5rem; border-top: 1px solid rgba(255, 255, 255, 0.08); padding-top: 1.5rem; }
        .info-row { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid rgba(255, 255, 255, 0.03); }
        .info-label { font-size: 0.85rem; color: #aaaaaa; font-weight: 400; text-transform: uppercase; letter-spacing: 0.5px; }
        .info-value { font-size: 1rem; color: #ffffff; font-weight: 600; }

        footer { padding: 1.5rem 6%; font-size: 0.85rem; color: rgba(255, 255, 255, 0.3); text-align: center; border-top: 1px solid rgba(255, 255, 255, 0.03); }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <i class="fas fa-id-card"></i>
        <span>Transport Profile</span>
    </div>
    <a th:href="@{/students/dashboard}" class="back-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
</header>

<div class="main-container">
    <div class="profile-card">

        <div class="avatar-section">
            <i class="fas fa-user-circle"></i>
            <h2 th:text="${student.name}">Student Name</h2>

            <div th:if="${student.status == 'APPROVED'}" class="status-badge status-approved">
                <i class="fas fa-check-circle"></i> Approved / Active
            </div>
            <div th:if="${student.status != 'APPROVED'}" class="status-badge status-pending">
                <i class="fas fa-clock"></i> Pending Verification
            </div>
        </div>

        <div class="info-grid">
            <div class="info-row">
                <span class="info-label">Registration No</span>
                <span class="info-value" th:text="${student.regNum}">2022-CS-00</span>
            </div>
            <div class="info-row">
                <span class="info-label">Department</span>
                <span class="info-value" th:text="${student.department}">Computer Science</span>
            </div>
            <div class="info-row">
                <span class="info-label">Official Email</span>
                <span class="info-value" th:text="${student.email}">student@uet.edu.pk</span>
            </div>
            <div class="info-row">
                <span class="info-label">Phone Contact</span>
                <span class="info-value" th:text="${student.phone != null ? student.phone : 'N/A'}">03000000000</span>
            </div>
        </div>

    </div>
</div>

<footer>
    University of Engineering & Technology | © 2026 Student Database Registry
</footer>

</body>
</html>
